name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Validate adapter
        run: control-promotion validate-adapter .control-promotion.yaml
      - name: Validate catalog
        run: control-promotion validate-catalog references/smell-catalog.yaml
