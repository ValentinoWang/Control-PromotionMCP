version: 1
smells:
  - id: frontend-semantic-metric-without-source
    fingerprint:
      subject: user-facing semantic metric
      boundary: production frontend UI and i18n
      bad_pattern: static metric literal presented as live KPI
      missing_proof:
        - api_source
        - provider_source
        - formula
        - unavailable_state
    protected_invariant: User-visible semantic business metrics must have provenance or an explicit unavailable state.
    control_state:
      level: L5_static_quality_guard
      destination: scripts/quality
    routing:
      destination: scripts/quality
      why:
        - static_detectable
        - actionable_failure_message_possible
    required_proof:
      - targeted_positive_case
      - targeted_negative_case
      - wrapper_command
      - ci_mode
    exception_policy:
      required_fields:
        - reason
        - owner
        - expires
        - scope
    retirement:
      condition: Metric sinks only accept sourced, derived, or unavailable values.
      action: downgrade_or_delete_heuristic_guard
  - id: ssot-symlink-edit-without-ownership-check
    fingerprint:
      subject: single source of truth symlink
      boundary: shared governance or harness document
      bad_pattern: repo-local change made through an SSOT symlink
      missing_proof:
        - readlink_target
        - ownership_classification
        - overlay_decision
    protected_invariant: Shared SSOT files must not absorb project-specific rules without explicit ownership review.
    control_state:
      level: L5_static_quality_guard
      destination: scripts/quality
    routing:
      destination: scripts/quality
      why:
        - static_detectable
        - stable_failure_class
    required_proof:
      - symlink_fixture
      - non_symlink_fixture
      - actionable_failure_message
      - ci_mode
    exception_policy:
      required_fields:
        - reason
        - owner
        - expires
        - scope
    retirement:
      condition: All SSOT-owned paths are edited only through owner-approved workflows or project overlays.
      action: keep_as_lightweight_pre_edit_guard
  - id: incident-string-guard-without-contract
    fingerprint:
      subject: quality guard
      boundary: project invariant
      bad_pattern: exact incident literals or current file paths guarded without a named contract
      missing_proof:
        - canonical_contract
        - targeted_positive_case
        - targeted_negative_case
        - scoped_surface_discovery
        - exception_policy
    protected_invariant: Guards must protect reusable project invariants, not only one observed incident.
    control_state:
      level: L5_static_quality_guard
      destination: scripts/quality
      promotion_blocker: abstraction_review.specificity_risk == high
    routing:
      destination: scripts/quality
      why:
        - static_detectable
        - incident_overfit_risk
    required_proof:
      - canonical_contract
      - targeted_positive_case
      - targeted_negative_case
      - scoped_surface_discovery
      - exception_policy
    exception_policy:
      required_fields:
        - reason
        - owner
        - expires
        - scope
    retirement:
      condition: The guard is backed by a canonical contract, scoped surface discovery, and passing/failing fixtures.
      action: promote_after_refactor
  - id: l5-guard-without-promotable-guard-spec
    fingerprint:
      subject: static quality guard
      boundary: L5 promotion gate
      bad_pattern: guard promoted without a valid GuardSpec and promotion gate proof
      missing_proof:
        - guard_spec
        - named_contract
        - scoped_surface_discovery
        - positive_negative_near_miss_exception_fixtures
        - exception_policy
        - retirement_path
    protected_invariant: Static quality guards must prove reusable control quality before L5 promotion.
    control_state:
      level: L5_static_quality_guard
      destination: scripts/quality
      promotion_blocker: guard_quality_review.promotion_gate.can_promote_to_L5 == false
    routing:
      destination: scripts/quality
      why:
        - guard_quality_gate
        - promotion_proof_required
    required_proof:
      - valid_guard_spec
      - promotion_gate_can_promote_to_L5
      - local_validation_command
    exception_policy:
      required_fields:
        - reason
        - owner
        - expires
        - scope
    retirement:
      condition: Every L5 guard in the project has a valid GuardSpec and local review-guard command.
      action: keep_as_meta_guard_policy
